<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carter's Taipei Guide</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-eats: #FF6B6B;
      --color-cafes: #FFB347;
      --color-boba: #A855F7;
      --color-bars: #9B59B6;
      --color-clubs: #E74C3C;
      --color-markets: #E91E8C;
      --color-attractions: #3498DB;
      --color-areas: #1ABC9C;
      --bg: #FFFAF5;
      --text: #1a1a2e;
      --text-muted: #666;
      --card-bg: #ffffff;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --shadow-hover: 0 12px 40px rgba(0,0,0,0.15);
      --radius: 16px;
      --tab-h: 68px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HERO ── */
    #hero {
      position: relative;
      height: 100vh;
      min-height: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    #hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1528360983277-13d401cdc186?auto=format&fit=crop&w=2400&q=85');
      background-size: cover;
      background-position: center 30%;
      filter: brightness(0.85);
      transform: scale(1.05);
      animation: heroZoom 20s ease-in-out infinite alternate;
    }

    @keyframes heroZoom {
      from { transform: scale(1.05); }
      to   { transform: scale(1.12); }
    }

    #hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.15) 0%,
        rgba(0,0,0,0.45) 50%,
        rgba(0,0,0,0.65) 100%
      );
    }

    .hero-content {
      position: relative;
      z-index: 2;
      padding: 0 24px;
      animation: heroFadeIn 1.2s ease-out both;
    }

    @keyframes heroFadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-eyebrow {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(13px, 2vw, 16px);
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      margin-bottom: 16px;
    }

    .hero-title {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(36px, 6vw, 78px);
      font-weight: 900;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 20px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .hero-title .flag {
      display: inline-block;
      animation: wave 2s ease-in-out infinite;
    }

    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      25%       { transform: rotate(20deg); }
      75%       { transform: rotate(-10deg); }
    }

    .hero-sub {
      font-family: 'Inter', sans-serif;
      font-size: clamp(16px, 2.5vw, 22px);
      color: rgba(255,255,255,0.85);
      font-weight: 400;
      margin-bottom: 48px;
    }

    .hero-cta {
      display: inline-block;
      background: #fff;
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 16px;
      padding: 16px 36px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      border: none;
    }

    .hero-cta:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
    }

    .scroll-arrow {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      color: rgba(255,255,255,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-family: 'Poppins', sans-serif;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: bounce 2.5s ease-in-out infinite;
      cursor: pointer;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.7; }
      50%       { transform: translateX(-50%) translateY(8px); opacity: 1; }
    }

    .scroll-arrow svg {
      width: 24px;
      height: 24px;
    }

    /* ── GUIDE SECTION ── */
    #guide {
      position: relative;
    }

    /* ── TABS ── */
    #tabs-wrap {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,250,245,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.07);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    #tabs {
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px;
      gap: 4px;
      height: var(--tab-h);
      align-items: center;
    }

    #tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 50px;
      border: 2px solid transparent;
      background: transparent;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.22s;
      white-space: nowrap;
    }

    .tab:hover {
      background: rgba(0,0,0,0.04);
      color: var(--text);
    }

    .tab.active {
      color: #fff;
      border-color: transparent;
    }

    .tab[data-cat="eats"].active        { background: var(--color-eats); }
    .tab[data-cat="cafes"].active       { background: var(--color-cafes); }
    .tab[data-cat="boba"].active        { background: var(--color-boba); }
    .tab[data-cat="bars"].active        { background: var(--color-bars); }
    .tab[data-cat="clubs"].active       { background: var(--color-clubs); }
    .tab[data-cat="markets"].active     { background: var(--color-markets); }
    .tab[data-cat="attractions"].active { background: var(--color-attractions); }
    .tab[data-cat="areas"].active       { background: var(--color-areas); }

    .card-name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .card-rating {
      font-size: 12px;
      font-weight: 700;
      color: #888;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin: 9px 0 2px;
    }

    .tag {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 50px;
      color: #fff;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── CARDS ── */
    #cards-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .section-header {
      margin-bottom: 32px;
      animation: fadeSlideIn 0.4s ease-out both;
    }

    .section-title {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 900;
      color: var(--text);
      margin-bottom: 6px;
    }

    .section-desc {
      font-size: 16px;
      color: var(--text-muted);
    }

    #cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    @media (max-width: 900px) {
      #cards-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 560px) {
      #cards-grid { grid-template-columns: 1fr; gap: 16px; }
      #cards-section { padding: 32px 16px 60px; }
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.25s, box-shadow 0.25s;
      cursor: default;
      animation: fadeSlideIn 0.4s ease-out both;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .card-top {
      height: 6px;
    }

    .card-body {
      padding: 20px 22px 22px;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .card-emoji {
      font-size: 28px;
      line-height: 1;
      flex-shrink: 0;
    }

    .card-name {
      font-family: 'Poppins', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .card-pill {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 50px;
      margin-top: 5px;
      opacity: 0.85;
      color: #fff;
    }

    .card-desc {
      font-size: 14px;
      line-height: 1.65;
      color: var(--text-muted);
      margin-top: 10px;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 32px 24px;
      color: var(--text-muted);
      font-size: 14px;
      border-top: 1px solid rgba(0,0,0,0.06);
    }

    footer span { opacity: 0.6; }
  </style>
</head>
<body>

<!-- ── HERO ── -->
<section id="hero">
  <div id="hero-bg"></div>
  <div id="hero-overlay"></div>

  <div class="hero-content">
    <p class="hero-eyebrow">✈️ Your personal city guide</p>
    <h1 class="hero-title">
      Carter welcomes you<br>to Taipei! <span class="flag">🇹🇼</span>
    </h1>
    <p class="hero-sub">Every spot you need — curated with love.</p>
    <button class="hero-cta" onclick="document.getElementById('guide').scrollIntoView({behavior:'smooth'})">
      Explore the guide →
    </button>
  </div>

  <div class="scroll-arrow" onclick="document.getElementById('guide').scrollIntoView({behavior:'smooth'})">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
    <span>scroll</span>
  </div>
</section>

<!-- ── GUIDE ── -->
<section id="guide">
  <div id="tabs-wrap">
    <div id="tabs">
      <button class="tab active" data-cat="eats">🍜 Eats</button>
      <button class="tab" data-cat="cafes">☕ Cafes</button>
      <button class="tab" data-cat="boba">🧋 Boba</button>
      <button class="tab" data-cat="bars">🍸 Bars</button>
      <button class="tab" data-cat="clubs">🎉 Clubs</button>
      <button class="tab" data-cat="markets">🌃 Night Markets</button>
      <button class="tab" data-cat="attractions">🗺️ Attractions</button>
      <button class="tab" data-cat="areas">🏙️ Areas</button>
    </div>
  </div>

  <div id="cards-section">
    <div class="section-header">
      <h2 class="section-title" id="section-title"></h2>
      <p class="section-desc" id="section-desc"></p>
    </div>
    <div id="cards-grid"></div>
  </div>
</section>

<footer>
  <span>Made with ❤️ by Carter &nbsp;·&nbsp; Taipei, Taiwan 🇹🇼</span>
</footer>

<script>
  const CATEGORIES = {

  const TAGS = {

  const PLACES = [
    // EATS

    { cat: 'eats', rating: 4.9, emoji: '🍢', name: '一起烤串 林森店', hood: 'Zhongshan', tags: ['must','carter'], desc: 'An izakaya with an auto-rotating yakitori conveyor belt. Grab skewers as they spin by, order drinks, stay all night.' },
    { cat: 'eats', rating: 4.9, emoji: '🐟', name: '吉川海鮮丼 中山店', hood: 'Zhongshan', tags: ['must','carter'], desc: 'Incredible Japanese seafood rice bowls — thick cuts of sashimi over perfectly seasoned rice. One of the best bowls in Taipei.' },
    { cat: 'eats', rating: 4.9, emoji: '🌶️', name: '岩漿麻辣火鍋', hood: 'Xinyi', tags: ['carter'], desc: 'Herbal spicy hotpot that hits deep. The broth is complex and addictive — a full sweaty, satisfying meal.' },
    { cat: 'eats', rating: 4.8, emoji: '🍛', name: 'Curry Lab. Tokyo', hood: 'Zhongshan', tags: ['carter'], desc: 'Japanese-style curry done with chef-level precision. Rich, layered sauce and perfectly cooked proteins.' },
    { cat: 'eats', rating: 4.8, emoji: '🍜', name: '小大麵線', hood: 'Da\'an', tags: ['hidden','carter'], desc: 'A beloved oyster noodle shop run by an illustrator — the art on the walls is as good as the food. A unique local gem.' },
    { cat: 'eats', rating: 4.8, emoji: '🍻', name: '狗一下居食酒堂', hood: 'Da\'an', tags: ['carter'], desc: 'A buzzing izakaya with great food and cold beer. Lively, loud, and exactly what you want after a long day of exploring.' },
    { cat: 'eats', rating: 4.8, emoji: '🍱', name: '創鮨 丼飯壽司', hood: 'Zhongshan', tags: ['carter'], desc: 'Creative Japanese donburi and sushi in an intimate space. The omakase bowls are outstanding value.' },
    { cat: 'eats', rating: 4.7, emoji: '🥟', name: 'Din Tai Fung', hood: 'Da\'an', tags: ['must','famous','touristy','group'], desc: 'World-famous xiao long bao (soup dumplings). The original Xinyi Road location is a Taipei rite of passage. Get there early.' },
    { cat: 'eats', rating: 4.7, emoji: '🍗', name: 'HOOTERS 信義', hood: 'Xinyi', tags: ['carter'], desc: 'Wings, cold beer, and a lively crowd right in the heart of Xinyi. A solid pre-game spot before hitting the clubs.' },
    { cat: 'eats', rating: 4.7, emoji: '🥩', name: '燒酒烤烤豬', hood: 'Da\'an', tags: ['carter'], desc: 'Korean BBQ done really well — great quality pork belly and ribs with solid soju selections. Get a big group together.' },
    { cat: 'eats', rating: 4.7, emoji: '🥩', name: '艾朋牛排餐酒館', hood: 'Da\'an', tags: [], desc: 'A sophisticated steak and wine bistro. Excellent cuts, thoughtful wine pairings, and a candlelit ambiance. Good date spot.' },
    { cat: 'eats', rating: 4.7, emoji: '🍣', name: '游壽司 麗水店', hood: 'Da\'an', tags: ['carter'], desc: 'Counter sushi in Da\'an — fresh, precise, and more affordable than omakase. Great for a sushi fix.' },
    { cat: 'eats', rating: 4.7, emoji: '🍛', name: '溫咖哩 Wen Curry', hood: 'Zhongshan', tags: ['carter'], desc: 'Japanese-style curry that takes it seriously — slow-cooked, deeply flavored, served over fluffy rice. Comfort food perfection.' },
    { cat: 'eats', rating: 4.7, emoji: '🫕', name: '灰鍋', hood: 'Da\'an', tags: ['carter'], desc: 'A sleek, modern hotpot restaurant with beautiful broths. Less chaotic than the big chains — a more refined experience.' },
    { cat: 'eats', rating: 4.6, emoji: '🍣', name: 'Ossu Handroll & Bar', hood: 'Xinyi', tags: ['carter'], desc: 'Fresh hand rolls made to order, Japanese-style, with a full bar attached. Fast, fun, and delicious.' },
    { cat: 'eats', rating: 4.6, emoji: '🍗', name: 'Hotties Fried Chicken', hood: 'Da\'an', tags: ['carter'], desc: 'American-style spicy fried chicken that delivers. Crispy, juicy, and spicy in all the right ways. A must if you love Nashville hot.' },

    { cat: 'eats', rating: 4.4, emoji: '🧆', name: '老店脆皮臭豆腐', hood: 'Ximending', tags: ['famous'], desc: 'Crispy stinky tofu — the real deal. If you haven\'t tried it, you have to. The smell is intense, the taste is addictive.' },

    { cat: 'eats', rating: 4.4, emoji: '🍜', name: '你回來啦拉麵', hood: 'Da\'an', tags: ['carter'], desc: '"You\'re back!" — the name says it all. A ramen shop so good you\'ll return the same trip. Rich tonkotsu broth, housemade noodles.' },

  function renderTags(tags) {
    if (!tags || tags.length === 0) return '';
    return '<div class="card-tags">' + tags.map(t => {
      const def = TAGS[t];
      return def ? `<span class="tag" style="background:${def.color}">${def.label}</span>` : '';
    }).join('') + '</div>';
  }

  function render(cat) {
    activeCategory = cat;
    const catData = CATEGORIES[cat];

    document.getElementById('section-title').textContent = catData.label;
    document.getElementById('section-desc').textContent = catData.desc;

    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.cat === cat);
    });

    const places = PLACES
      .filter(p => p.cat === cat)
      .sort((a, b) => (b.rating || 0) - (a.rating || 0));

    const grid = document.getElementById('cards-grid');
    grid.innerHTML = '';

    places.forEach((place, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${i * 60}ms`;
      card.innerHTML = `
        <div class="card-top" style="background:${catData.color}"></div>
        <div class="card-body">
          <div class="card-header">
            <span class="card-emoji">${place.emoji}</span>
            <div style="flex:1;min-width:0">
              <div class="card-name-row">
                <div class="card-name">${place.name}</div>
                ${place.rating != null ? `<span class="card-rating">⭐ ${place.rating.toFixed(1)}</span>` : ''}
              </div>
              <span class="card-pill" style="background:${catData.color}">${place.hood}</span>
            </div>
          </div>
          ${renderTags(place.tags)}
          <p class="card-desc">${place.desc}</p>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      render(tab.dataset.cat);
      document.getElementById('cards-section').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  });

  render('eats');
</script>

</body>
</html>
