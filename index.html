    name="twitter:description"
    content="ni hao Emily, Tim, Allison, & Andrea! here's a guide on where to eat, drink, party, and places to see in Taipei."
  />
  <meta name="twitter:image" content="https://taipei-guide-etaa.vercel.app/assets/share-preview.png" />
  <meta name="twitter:image:alt" content="Carter welcomes you to Taipei over a night skyline hero image." />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-eats: #FF6B6B;
      --color-cafes: #FFB347;
      --color-boba: #A855F7;
      --color-bars: #9B59B6;
      --color-clubs: #E74C3C;
      --color-markets: #E91E8C;
      --color-attractions: #3498DB;
      --color-areas: #1ABC9C;
      --bg: #FFFAF5;
      --text: #1a1a2e;
      --text-muted: #666;
      --card-bg: #ffffff;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --shadow-hover: 0 8px 28px rgba(0,0,0,0.12);
      --radius: 12px;
      --tab-h: 60px;
      --focus-ring: 0 0 0 3px rgba(32, 172, 143, 0.22);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(circle at top left, rgba(255, 173, 87, 0.14), transparent 26%),
        radial-gradient(circle at top right, rgba(52, 152, 219, 0.12), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,0.18), transparent 22%);
      color: var(--text);
      min-height: 100vh;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button:focus-visible,
    a:focus-visible {
      outline: none;
      box-shadow: var(--focus-ring);
    }

    /* ── HERO ── */
    #hero {
      position: relative;
      height: 100vh;
      min-height: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    #hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://images.pexels.com/photos/28617722/pexels-photo-28617722/free-photo-of-taipei-101-skyline-at-night-from-elephant-mountain.jpeg?auto=compress&cs=tinysrgb&w=2400');
      background-size: cover;
      background-position: center 30%;
      filter: brightness(0.85);
      transform: scale(1.05);
      animation: heroZoom 20s ease-in-out infinite alternate;
    }

    @keyframes heroZoom {
      from { transform: scale(1.05); }
      to   { transform: scale(1.12); }
    }

    #hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.15) 0%,
        rgba(0,0,0,0.45) 50%,
        rgba(0,0,0,0.65) 100%
      );
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 880px;
      padding: 0 24px;
      animation: heroFadeIn 1.2s ease-out both;
    }

    @keyframes heroFadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-title {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(32px, 5.5vw, 68px);
      font-weight: 900;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 28px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.35);
    }

    .hero-title .flag {
      display: inline-block;
      animation: wave 2s ease-in-out infinite;
    }

    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      25%       { transform: rotate(20deg); }
      75%       { transform: rotate(-10deg); }
    }

    .hero-subtitle {
      max-width: 680px;
      margin: 0 auto 36px;
      color: rgba(255,255,255,0.86);
      font-size: clamp(15px, 2vw, 19px);
      line-height: 1.65;
      text-wrap: balance;
      text-shadow: 0 2px 10px rgba(0,0,0,0.26);
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      background: #fff;
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 30px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 6px 24px rgba(0,0,0,0.22);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      border: none;
    }

    .hero-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(0,0,0,0.3);
    }

    .scroll-arrow {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-family: 'Poppins', sans-serif;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: bounce 2.5s ease-in-out infinite;
      cursor: pointer;
    }

    .scroll-arrow:focus-visible {
      box-shadow: 0 0 0 3px rgba(255,255,255,0.26);
      border-radius: 16px;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.7; }
      50%       { transform: translateX(-50%) translateY(8px); opacity: 1; }
    }

    .scroll-arrow svg {
      width: 24px;
      height: 24px;
    }

    /* ── GUIDE SECTION ── */
    #guide {
      position: relative;
    }

    /* ── TABS ── */
    #tabs-wrap {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,250,245,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.07);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    #tabs-inner {
      display: flex;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      height: var(--tab-h);
      padding-right: 8px;
    }

    #tabs {
      display: flex;
      flex: 1;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 0 8px 0 16px;
      gap: 2px;
      height: 100%;
      align-items: center;
    }

    #tabs::-webkit-scrollbar { display: none; }

    #theme-toggle {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    #theme-toggle:hover {
      background: rgba(0,0,0,0.07);
      color: var(--text);
    }

    #theme-toggle-mobile {
      display: none;
    }

    @media (max-width: 560px) {
      #tabs {
        padding-left: 12px;
      }

      #theme-toggle {
        width: 38px;
        height: 38px;
        border-radius: 999px;
        background: rgba(255,255,255,0.12);
        color: rgba(255,255,255,0.82);
        border: 1px solid rgba(255,255,255,0.12);
        box-shadow: 0 8px 18px rgba(0,0,0,0.16);
      }

      body:not(.dark) #theme-toggle {
        background: rgba(0,0,0,0.04);
        color: var(--text);
        border-color: rgba(0,0,0,0.08);
        box-shadow: 0 6px 16px rgba(0,0,0,0.08);
      }
    }

    body:not(.dark) .icon-sun { display: none; }
    body.dark .icon-moon      { display: none; }

    .tab {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      gap: 6px;
      padding: 7px 16px 9px;
      border-radius: 50px;
      border: 2px solid transparent;
      background: transparent;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.22s;
      white-space: nowrap;
    }

    .tab:hover {
      background: rgba(0,0,0,0.04);
      color: var(--text);
    }

    .tab.active {
      color: #fff;
      border-color: transparent;
    }

    .tab[data-cat="eats"].active        { background: var(--color-eats); }
    .tab[data-cat="cafes"].active       { background: var(--color-cafes); }
    .tab[data-cat="boba"].active        { background: var(--color-boba); }
    .tab[data-cat="bars"].active        { background: var(--color-bars); }
    .tab[data-cat="clubs"].active       { background: var(--color-clubs); }
    .tab[data-cat="markets"].active     { background: var(--color-markets); }
    .tab[data-cat="attractions"].active { background: var(--color-attractions); }
    .tab[data-cat="areas"].active       { background: var(--color-areas); }

    .card-name-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 6px;
    }

    .name-mrt {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .mrt-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 50px;
      color: #fff;
      letter-spacing: 0.02em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-rating {
      font-size: 11px;
      font-weight: 700;
      color: #999;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin: 7px 0 2px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 4px;
      border: 1.5px solid;
      background: transparent;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .card-img {
      position: relative;
      height: 175px;
      background: linear-gradient(135deg, #ede8e2 0%, #ddd8d0 100%);
      overflow: hidden;
      flex-shrink: 0;
    }

    .card-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0%, transparent 52%, rgba(7, 11, 24, 0.18) 100%);
      pointer-events: none;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.01);
      transition: transform 0.45s ease, filter 0.45s ease;
    }

    /* ── CARDS ── */
    #cards-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 64px;
    }

    .section-header {
      margin-bottom: 24px;
      animation: fadeSlideIn 0.4s ease-out both;
    }

    .section-meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding: 7px 12px;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 999px;
      background: rgba(255,255,255,0.78);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .section-title {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(22px, 3.5vw, 32px);
      font-weight: 900;
      color: var(--text);
      margin-bottom: 4px;
    }

    .section-desc {
      font-size: 15px;
      color: var(--text-muted);
    }

    #cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    @media (max-width: 900px) {
      #cards-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 560px) {
      #cards-grid        { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      #cards-section     { padding: 18px 12px 48px; }
      #filters-bar       { padding: 12px 12px 0; gap: 6px; }
      #filter-tags       { gap: 6px; }
      .filter-btn        { font-size: 11px; padding: 5px 10px; }
      #filters-bar #theme-toggle { width: 32px; height: 32px; }

      /* Hide emoji — redundant with cover image, frees up width */
      .card-emoji        { display: none; }

      /* Card image */
      .card-img          { height: 110px; }

      /* Card body — tighter padding */
      .card-body         { padding: 8px 10px 10px; }
      .card-header       { gap: 0; margin-bottom: 5px; }

      /* Name row: name on left, rating on right — both on their own lines */
      .card-name-row     { align-items: flex-start; gap: 4px; }
      .name-mrt          { flex-direction: column; align-items: flex-start; gap: 3px; min-width: 0; flex: 1; }
      .card-name         { font-size: 12px; line-height: 1.25; font-weight: 700; }
      .mrt-badge         { font-size: 9px; padding: 2px 5px; }
      .card-rating       { font-size: 10px; white-space: nowrap; flex-shrink: 0; padding-top: 1px; }

      /* Tags */
      .card-tags         { gap: 3px; margin: 4px 0 2px; }
      .tag               { font-size: 9px; padding: 2px 5px; }

      .card-desc         { font-size: 11px; line-height: 1.45;
                           display: -webkit-box; -webkit-line-clamp: 3;
                           -webkit-box-orient: vertical; overflow: hidden; }
      .card-desc.expanded { display: block; overflow: visible; }
      .read-more         { display: inline-block; margin-top: 4px; font-size: 11px;
                           font-weight: 600; font-family: 'Inter', sans-serif;
                           color: var(--text-muted); cursor: pointer;
                           text-decoration: underline; text-underline-offset: 2px;
                           text-decoration-thickness: 1px; opacity: 0.7;
                           border: none; background: none; padding: 0;
                           position: relative; z-index: 2; }
    }

    @media (max-width: 360px) {
      #cards-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .card-img   { height: 95px; }
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.05);
      transition: transform 0.25s, box-shadow 0.25s;
      cursor: pointer;
      animation: fadeSlideIn 0.4s ease-out both;
      position: relative;
    }

    .card-link {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .card-name,
    .read-more {
      position: relative;
      z-index: 2;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .card-top {
      height: 4px;
      background: linear-gradient(90deg, var(--card-accent, rgba(0,0,0,0.08)), color-mix(in srgb, var(--card-accent, rgba(0,0,0,0.08)) 58%, white));
    }

    .card:hover .card-img img {
      transform: scale(1.06);
      filter: saturate(1.04);
    }

    .card-body {
      padding: 16px 18px 18px;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .card-emoji {
      font-size: 22px;
      line-height: 1;
      flex-shrink: 0;
    }

    .card-name {
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      text-decoration: none;
    }

    .card-name:hover {
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
    }

    .card-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 50px;
      margin-top: 4px;
      opacity: 0.85;
      color: #fff;
    }

    .card-desc {
      font-size: 13.5px;
      line-height: 1.6;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .read-more { display: none; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── FILTERS ── */
    #filters-bar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 14px 24px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #filter-tags {
      display: flex;
      flex: 1;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    #filters-bar #theme-toggle {
      flex-shrink: 0;
      border: 1.5px solid rgba(0,0,0,0.14);
      background: rgba(0,0,0,0.02);
    }

    .filter-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 50px;
      border: 1.5px solid rgba(0,0,0,0.14);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .filter-btn:hover {
      border-color: rgba(0,0,0,0.3);
      color: var(--text);
    }

    .filter-btn.active {
      color: #fff;
    }

    #cards-section,
    #guide,
    #cards-grid,
    #cards-section .section-header {
      scroll-margin-top: calc(var(--tab-h) + 24px);
    }

    .filter-group-header {
      grid-column: 1 / -1;
      font-family: 'Poppins', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 8px 0 4px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      margin-top: 8px;
    }

    .filter-group-header:first-child { margin-top: 0; }

    /* ── DARK MODE ── */
    body.dark {
      --bg:          #0d0d14;
      --text:        #e8e8f2;
      --text-muted:  #a4a3bf;
      --card-bg:     #17171f;
      --shadow:      0 2px 12px rgba(0,0,0,0.5);
      --shadow-hover: 0 8px 28px rgba(0,0,0,0.7);
      --focus-ring:  0 0 0 3px rgba(91, 215, 191, 0.24);
    }

    body.dark #tabs-wrap {
      background: rgba(13,13,20,0.94);
      border-bottom-color: rgba(255,255,255,0.07);
      box-shadow: 0 2px 12px rgba(0,0,0,0.35);
    }

    body.dark .tab:hover { background: rgba(255,255,255,0.06); }

    body.dark #theme-toggle:hover { background: rgba(255,255,255,0.1); }

    body.dark .hero-cta {
      background: rgba(255,255,255,0.13);
      color: #fff;
      box-shadow: none;
    }

    body.dark .hero-cta:hover { background: rgba(255,255,255,0.22); }

    body.dark .filter-btn {
      border-color: rgba(255,255,255,0.14);
    }

    body.dark #filters-bar #theme-toggle {
      border-color: rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: var(--text);
    }

    body.dark .filter-btn:hover {
      border-color: rgba(255,255,255,0.3);
      color: var(--text);
    }

    body.dark .filter-group-header {
      border-bottom-color: rgba(255,255,255,0.08);
    }

    body.dark .section-meta {
      border-color: rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
    }

    body.dark .card-img {
      background: linear-gradient(135deg, #1c1c28 0%, #14141e 100%);
    }

    body.dark .card {
      border-color: rgba(255,255,255,0.06);
    }

    body.dark footer {
      border-top-color: rgba(255,255,255,0.07);
    }

    body.dark #tabs-wrap {
      background: rgba(13,13,20,0.94);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 20px 24px;
      color: var(--text-muted);

  function getImgUrl(place) {
    if (PLACE_URLS[place.name]) return PLACE_URLS[place.name];
    const key = PLACE_IMGS[place.name] || CAT_IMG[place.cat];
    const id  = IMGS[key];
    return id ? `https://images.unsplash.com/${id}?auto=format&fit=crop&w=600&q=75` : '';
  }

  let activeCategory = 'eats';
  let activeFilter   = null;

  function renderTags(tags) {
    if (!tags || tags.length === 0) return '';
    return '<div class="card-tags">' + tags.map(t => {
      const def = TAGS[t];
      return def ? `<span class="tag" style="color:${def.color};border-color:${def.color}">${def.label}</span>` : '';
    }).join('') + '</div>';
  }

  function buildCard(place, delay) {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${delay}ms`;
    card.style.setProperty('--card-accent', CATEGORIES[place.cat].color);
    const imgUrl = getImgUrl(place);
    card.innerHTML = `
      <a class="card-link" href="${getMapsUrl(place)}" target="_blank" rel="noopener noreferrer" aria-label="Open ${place.name} in Google Maps"></a>
      <div class="card-top" aria-hidden="true"></div>
      <div class="card-img">${imgUrl ? `<img src="${imgUrl}" alt="Photo of ${place.name}" loading="lazy" decoding="async" onerror="this.remove()">` : ''}</div>
      <div class="card-body">
        <div class="card-header">
          <span class="card-emoji">${place.emoji}</span>
          <div style="flex:1;min-width:0">
            <div class="card-name-row">
              <div class="name-mrt">
                <a class="card-name" href="${getMapsUrl(place)}" target="_blank" rel="noopener noreferrer">${place.name}</a>
                ${getMrtBadge(place.hood)}
              </div>
              ${place.rating != null ? `<span class="card-rating">⭐ ${place.rating.toFixed(1)}</span>` : ''}
            </div>
          </div>
        </div>
        ${renderTags(place.tags)}
        <p class="card-desc">${place.desc}</p>
        <button class="read-more">Read more</button>
      </div>
    `;
    return card;
  }

  function setFilterBtns(tag) {
    document.querySelectorAll('.filter-btn').forEach(b => {
      const on = b.dataset.tag === tag;
      b.classList.toggle('active', on);
      b.style.background   = on ? TAGS[b.dataset.tag].color : '';
      b.style.borderColor  = on ? TAGS[b.dataset.tag].color : '';
      b.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
  }

  function render(cat) {
    activeCategory = cat;
    activeFilter   = null;
    setFilterBtns(null);

    const catData = CATEGORIES[cat];
    document.getElementById('section-title').textContent = catData.label;
    document.getElementById('section-desc').textContent  = catData.desc;
    const places = PLACES.filter(p => p.cat === cat).sort((a, b) => (b.rating || 0) - (a.rating || 0));
    document.getElementById('section-meta').textContent = getCountLabel(places.length);
    document.querySelectorAll('.tab').forEach(t => {
      const on = t.dataset.cat === cat;
      t.classList.toggle('active', on);
      t.setAttribute('aria-pressed', on ? 'true' : 'false');
    });

    const grid = document.getElementById('cards-grid');
    grid.innerHTML = '';
    places.forEach((p, i) => grid.appendChild(buildCard(p, i * 60)));
    requestAnimationFrame(checkReadMore);
  }

  function renderFilter(tag) {
    activeFilter = tag;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    setFilterBtns(tag);

    const tagDef = TAGS[tag];
    document.getElementById('section-title').textContent = tagDef.label;
    document.getElementById('section-desc').textContent  = `Every spot tagged "${tagDef.label}" across all categories.`;

    const matching = PLACES.filter(p => p.tags.includes(tag));
    document.getElementById('section-meta').textContent = getCountLabel(matching.length);
    const groups = {};
    matching.forEach(p => { if (!groups[p.cat]) groups[p.cat] = []; groups[p.cat].push(p); });
    Object.values(groups).forEach(g => g.sort((a, b) => (b.rating || 0) - (a.rating || 0)));

    const grid = document.getElementById('cards-grid');
    grid.innerHTML = '';
    let idx = 0;
    const catOrder = ['eats','cafes','boba','bars','clubs','markets','attractions','areas'];
    catOrder.filter(c => groups[c]).forEach(cat => {
      const hdr = document.createElement('div');
      hdr.className = 'filter-group-header';
      hdr.textContent = CATEGORIES[cat].label;
      grid.appendChild(hdr);
      groups[cat].forEach(p => grid.appendChild(buildCard(p, idx++ * 40)));
    });
    requestAnimationFrame(checkReadMore);
  }

  function checkReadMore() {
    document.querySelectorAll('.card-desc').forEach(desc => {
      const btn = desc.nextElementSibling;
      if (!btn || !btn.classList.contains('read-more')) return;
      // Only show toggle if text is actually clamped
      const isClamped = desc.scrollHeight > desc.clientHeight + 2;
      btn.style.display = isClamped ? '' : 'none';
    });
  }

  window.addEventListener('resize', checkReadMore);

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      render(tab.dataset.cat);
      document.getElementById('cards-section').scrollIntoView({ behavior: smoothBehavior(), block: 'nearest' });
    });
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tag = btn.dataset.tag;
      if (activeFilter === tag) {
        render(activeCategory);
      } else {
        renderFilter(tag);
        document.getElementById('cards-section').scrollIntoView({ behavior: smoothBehavior(), block: 'nearest' });
      }
    });
  });

  render('eats');

  // ── DARK MODE ──
  const themeToggle       = document.getElementById('theme-toggle');
  const themeToggleMobile = document.getElementById('theme-toggle-mobile');
  const themeLabel        = document.getElementById('theme-toggle-label');

  function applyTheme(dark) {
    document.body.classList.toggle('dark', dark);
    localStorage.setItem('theme', dark ? 'dark' : 'light');
    themeLabel.textContent = dark ? 'Light mode' : 'Dark mode';
    document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
  }

  const saved = localStorage.getItem('theme');
  applyTheme(saved ? saved === 'dark' : true);

  document.getElementById('cards-grid').addEventListener('click', function(e) {
    const btn = e.target.closest('.read-more');
    if (!btn) return;
    const desc = btn.previousElementSibling;
    const expanded = desc.classList.toggle('expanded');
    btn.textContent = expanded ? 'Show less' : 'Read more';
  });

  themeToggle.addEventListener('click', () => applyTheme(!document.body.classList.contains('dark')));
  themeToggleMobile.addEventListener('click', () => applyTheme(!document.body.classList.contains('dark')));
</script>

<script>
(function() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const canvas = document.getElementById('fireworks');
  const ctx    = canvas.getContext('2d');
  const hero   = document.getElementById('hero');
  let dpr = window.devicePixelRatio || 1;
  const COLORS = [
    '#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bff',
    '#ffb347','#c9f0ff','#ff9f7f','#ffffff','#ffe66d',
  ];

  function resize() {
    dpr = window.devicePixelRatio || 1;
    canvas.width  = Math.round(hero.offsetWidth * dpr);
    canvas.height = Math.round(hero.offsetHeight * dpr);
    canvas.style.width = `${hero.offsetWidth}px`;
    canvas.style.height = `${hero.offsetHeight}px`;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Particle ──
  class Particle {
    constructor(x, y, color, vx, vy, size) {
      this.x = x; this.y = y;
      this.vx = vx; this.vy = vy;
      this.color = color;
      this.alpha = 1;
      this.size  = size || (Math.random() * 2 + 0.9);
      this.decay = Math.random() * 0.024 + 0.02;
      this.gravity = 0.06;
      this.trail = [];
    }
    update() {
      this.trail.push({ x: this.x, y: this.y, a: this.alpha });
      if (this.trail.length > 3) this.trail.shift();
      this.vy += this.gravity;
      this.vx *= 0.98;
      this.x  += this.vx;
      this.y  += this.vy;
      this.alpha -= this.decay;
    }
    draw() {
      for (let i = 0; i < this.trail.length; i++) {
        const t = this.trail[i];
        ctx.globalAlpha = t.a * (i / this.trail.length) * 0.2;
        ctx.fillStyle   = this.color;
        ctx.beginPath();
        ctx.arc(t.x, t.y, this.size * 0.45, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = this.alpha;
      ctx.fillStyle   = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    isDead() {
      return (
        this.alpha <= 0 ||
        this.y > hero.offsetHeight + 36 ||
        this.x < -36 ||
        this.x > hero.offsetWidth + 36
      );
    }
  }

  // ── Rocket ──
  class Rocket {
    constructor(options = {}) {
      this.x     = options.x ?? canvas.width * (0.15 + Math.random() * 0.7);
      this.y     = canvas.height;
      this.targetY = options.targetY ?? canvas.height * (0.1 + Math.random() * 0.45);
      this.vy    = -10 - Math.random() * 5;
      this.color = options.color ?? COLORS[Math.floor(Math.random() * COLORS.length)];
      this.trail = [];
      this.exploded = false;
    }
    update(particles) {
      this.trail.push({ x: this.x, y: this.y });
      if (this.trail.length > 10) this.trail.shift();
      this.vy *= 0.98;
      this.y += this.vy;
      if (this.y <= this.targetY) {
        this.explode(particles);
        this.exploded = true;
      }
    }
    explode(particles) {
      const count = 80 + Math.floor(Math.random() * 60);
      const color2 = COLORS[Math.floor(Math.random() * COLORS.length)];
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.3;
        const speed = 1.5 + Math.random() * 4;
        const c = Math.random() < 0.3 ? color2 : this.color;
        particles.push(new Particle(
          this.x, this.y, c,
          Math.cos(angle) * speed,
          Math.sin(angle) * speed,
          Math.random() * 2.5 + 0.8
        ));
      }
    }
    draw() {
      for (let i = 0; i < this.trail.length; i++) {
        const t = this.trail[i];
        ctx.globalAlpha = (i / this.trail.length) * 0.6;
        ctx.fillStyle   = this.color;
        ctx.beginPath();
        ctx.arc(t.x, t.y, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.fillStyle   = '#fff';
      ctx.beginPath();
      ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  const particles = [];
  const rockets   = [];
  let introStarted = false;

  function explodeAt(x, y) {
    const count  = 90 + Math.floor(Math.random() * 50);
    const color  = COLORS[Math.floor(Math.random() * COLORS.length)];
    const color2 = COLORS[Math.floor(Math.random() * COLORS.length)];
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.4;
      const speed = 1.5 + Math.random() * 5;
      particles.push(new Particle(
        x, y,
        Math.random() < 0.3 ? color2 : color,
        Math.cos(angle) * speed,
        Math.sin(angle) * speed,
        Math.random() * 2.5 + 0.8
      ));
    }
    // sparkle ring
    for (let i = 0; i < 18; i++) {
      const angle = (Math.PI * 2 * i) / 18;
      particles.push(new Particle(x, y, '#ffffff', Math.cos(angle) * 7, Math.sin(angle) * 7, 1));
    }
  }

  function launchBurst(n) {
    for (let i = 0; i < n; i++) {
      setTimeout(() => rockets.push(new Rocket()), i * 220);
    }
  }

  function launchDirectedBurst(config) {
    const {
      count = 2,
      delay = 0,
      spread = 0.08,
      xRatio = 0.5,
      heightMin = 0.16,
      heightMax = 0.34,
    } = config;

    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const x = canvas.width * (xRatio + (Math.random() - 0.5) * spread);
        const targetY = canvas.height * (heightMin + Math.random() * (heightMax - heightMin));
        rockets.push(new Rocket({ x, targetY }));
      }, delay + i * 180);
    }
  }

  function startIntroShow() {
    if (introStarted) return;
    introStarted = true;

    const W = hero.offsetWidth;
    const H = hero.offsetHeight;

    // Instant explosions — visible on frame 1
    explodeAt(W * 0.22, H * 0.25);
    explodeAt(W * 0.78, H * 0.20);
    explodeAt(W * 0.50, H * 0.15);
    setTimeout(() => { explodeAt(W * 0.35, H * 0.30); explodeAt(W * 0.65, H * 0.22); }, 120);
    setTimeout(() => { explodeAt(W * 0.15, H * 0.18); explodeAt(W * 0.85, H * 0.28); }, 280);

    // Follow-up rockets
    [
      { delay: 400,  count: 2, xRatio: 0.24, spread: 0.05, heightMin: 0.18, heightMax: 0.3 },
      { delay: 900,  count: 3, xRatio: 0.74, spread: 0.05, heightMin: 0.16, heightMax: 0.3 },
      { delay: 1400, count: 4, xRatio: 0.5,  spread: 0.12, heightMin: 0.12, heightMax: 0.24 },
    ].forEach(launchDirectedBurst);
  }

  function tick(ts) {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    if (!introStarted) {
      startIntroShow();
    }

    // Update & draw rockets
    for (let i = rockets.length - 1; i >= 0; i--) {
      rockets[i].update(particles);
      if (rockets[i].exploded) { rockets.splice(i, 1); continue; }
      rockets[i].draw();
    }

    // Update & draw particles
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update();
      if (particles[i].isDead()) { particles.splice(i, 1); continue; }
      particles[i].draw();
    }

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);

  // Click anywhere on hero to trigger a burst
  hero.addEventListener('click', function(e) {
    if (e.target.closest('button, a')) return;
    const rect = hero.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const count = 80 + Math.floor(Math.random() * 40);
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    const color2 = COLORS[Math.floor(Math.random() * COLORS.length)];
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.4;
      const speed = 2 + Math.random() * 5;
      particles.push(new Particle(
        x, e.clientY - rect.top,
        Math.random() < 0.4 ? color2 : color,
        Math.cos(angle) * speed,
        Math.sin(angle) * speed
      ));
    }
  });
})();
</script>

</body>
