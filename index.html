<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carter's Taipei Guide</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-eats: #FF6B6B;
      --color-cafes: #FFB347;
      --color-boba: #A855F7;
      --color-bars: #9B59B6;
      --color-clubs: #E74C3C;
      --color-markets: #E91E8C;
      --color-attractions: #3498DB;
      --color-areas: #1ABC9C;
      --bg: #FFFAF5;
      --text: #1a1a2e;
      --text-muted: #666;
      --card-bg: #ffffff;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --shadow-hover: 0 8px 28px rgba(0,0,0,0.12);
      --radius: 12px;
      --tab-h: 60px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HERO ── */
    #hero {
      position: relative;
      height: 100vh;
      min-height: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    #hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1528360983277-13d401cdc186?auto=format&fit=crop&w=2400&q=85');
      background-size: cover;
      background-position: center 30%;
      filter: brightness(0.85);
      transform: scale(1.05);
      animation: heroZoom 20s ease-in-out infinite alternate;
    }

    @keyframes heroZoom {
      from { transform: scale(1.05); }
      to   { transform: scale(1.12); }
    }

    #hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.15) 0%,
        rgba(0,0,0,0.45) 50%,
        rgba(0,0,0,0.65) 100%
      );
    }

    .hero-content {
      position: relative;
      z-index: 2;
      padding: 0 24px;
      animation: heroFadeIn 1.2s ease-out both;
    }

    @keyframes heroFadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-title {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(32px, 5.5vw, 68px);
      font-weight: 900;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 28px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.35);
    }

    .hero-title .flag {
      display: inline-block;
      animation: wave 2s ease-in-out infinite;
    }

    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      25%       { transform: rotate(20deg); }
      75%       { transform: rotate(-10deg); }
    }

    .hero-stats {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 12px;
      padding: 12px 18px;
      min-width: 90px;
      cursor: pointer;
      transition: background 0.18s, transform 0.18s;
    }

    .hero-stat:hover {
      background: rgba(255,255,255,0.24);
      transform: translateY(-2px);
    }

    .stat-label {
      font-family: 'Poppins', sans-serif;
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.75);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      text-align: center;
      line-height: 1;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      background: #fff;
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 30px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 6px 24px rgba(0,0,0,0.22);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      border: none;
    }

    .hero-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(0,0,0,0.3);
    }

    .scroll-arrow {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      color: rgba(255,255,255,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-family: 'Poppins', sans-serif;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: bounce 2.5s ease-in-out infinite;
      cursor: pointer;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.7; }
      50%       { transform: translateX(-50%) translateY(8px); opacity: 1; }
    }

    .scroll-arrow svg {
      width: 24px;
      height: 24px;
    }

    /* ── GUIDE SECTION ── */
    #guide {
      position: relative;
    }

    /* ── TABS ── */
    #tabs-wrap {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,250,245,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.07);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    #tabs-inner {
      display: flex;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      height: var(--tab-h);
      padding-right: 8px;
    }

    #tabs {
      display: flex;
      flex: 1;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 0 8px 0 16px;
      gap: 2px;
      height: 100%;
      align-items: center;
    }

    #tabs::-webkit-scrollbar { display: none; }

    #theme-toggle {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    #theme-toggle:hover {
      background: rgba(0,0,0,0.07);
      color: var(--text);
    }

    body:not(.dark) .icon-sun { display: none; }
    body.dark .icon-moon      { display: none; }

    .tab {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      gap: 6px;
      padding: 7px 16px 9px;
      border-radius: 50px;
      border: 2px solid transparent;
      background: transparent;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.22s;
      white-space: nowrap;
    }

    .tab:hover {
      background: rgba(0,0,0,0.04);
      color: var(--text);
    }

    .tab.active {
      color: #fff;
      border-color: transparent;
    }

    .tab[data-cat="eats"].active        { background: var(--color-eats); }
    .tab[data-cat="cafes"].active       { background: var(--color-cafes); }
    .tab[data-cat="boba"].active        { background: var(--color-boba); }
    .tab[data-cat="bars"].active        { background: var(--color-bars); }
    .tab[data-cat="clubs"].active       { background: var(--color-clubs); }
    .tab[data-cat="markets"].active     { background: var(--color-markets); }
    .tab[data-cat="attractions"].active { background: var(--color-attractions); }
    .tab[data-cat="areas"].active       { background: var(--color-areas); }

    .card-name-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 6px;
    }

    .name-mrt {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .mrt-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 50px;
      color: #fff;
      letter-spacing: 0.02em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-rating {
      font-size: 11px;
      font-weight: 700;
      color: #999;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin: 7px 0 2px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 4px;
      border: 1.5px solid;
      background: transparent;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .card-img {
      height: 175px;
      background: linear-gradient(135deg, #ede8e2 0%, #ddd8d0 100%);
      overflow: hidden;
      flex-shrink: 0;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── CARDS ── */
    #cards-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 64px;
    }

    .section-header {
      margin-bottom: 24px;
      animation: fadeSlideIn 0.4s ease-out both;
    }

    .section-title {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(22px, 3.5vw, 32px);
      font-weight: 900;
      color: var(--text);
      margin-bottom: 4px;
    }

    .section-desc {
      font-size: 15px;
      color: var(--text-muted);
    }

    #cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    @media (max-width: 900px) {
      #cards-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 560px) {
      #cards-grid        { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      #cards-section     { padding: 18px 12px 48px; }
      #filters-bar       { padding: 12px 12px 0; gap: 6px; }
      .filter-btn        { font-size: 11px; padding: 5px 10px; }

      /* Hide emoji — redundant with cover image, frees up width */
      .card-emoji        { display: none; }

      /* Card image */
      .card-img          { height: 110px; }

      /* Card body — tighter padding */
      .card-body         { padding: 8px 10px 10px; }
      .card-header       { gap: 0; margin-bottom: 5px; }

      /* Name row: name on left, rating on right — both on their own lines */
      .card-name-row     { align-items: flex-start; gap: 4px; }
      .name-mrt          { flex-direction: column; align-items: flex-start; gap: 3px; min-width: 0; flex: 1; }
      .card-name         { font-size: 12px; line-height: 1.25; font-weight: 700;
                           white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
      .mrt-badge         { font-size: 9px; padding: 2px 5px; }
      .card-rating       { font-size: 10px; white-space: nowrap; flex-shrink: 0; padding-top: 1px; }

      /* Tags */
      .card-tags         { gap: 3px; margin: 4px 0 2px; }
      .tag               { font-size: 9px; padding: 2px 5px; }

      /* Clamp description to 3 lines */
      .card-desc         { font-size: 11.5px; line-height: 1.45;
                           display: -webkit-box; -webkit-line-clamp: 3;
                           -webkit-box-orient: vertical; overflow: hidden; }
    }

    @media (max-width: 360px) {
      #cards-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .card-img   { height: 95px; }
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.25s, box-shadow 0.25s;
      cursor: default;
      animation: fadeSlideIn 0.4s ease-out both;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .card-top {
      height: 4px;
    }

    .card-body {
      padding: 16px 18px 18px;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .card-emoji {
      font-size: 22px;
      line-height: 1;
      flex-shrink: 0;
    }

    .card-name {
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      text-decoration: none;
    }

    .card-name:hover {
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
    }

    .card-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 50px;
      margin-top: 4px;
      opacity: 0.85;
      color: #fff;
    }

    .card-desc {
      font-size: 13.5px;
      line-height: 1.6;
      color: var(--text-muted);
      margin-top: 8px;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── FILTERS ── */
    #filters-bar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 14px 24px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 50px;
      border: 1.5px solid rgba(0,0,0,0.14);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .filter-btn:hover {
      border-color: rgba(0,0,0,0.3);
      color: var(--text);
    }

    .filter-btn.active {
      color: #fff;
    }

    .filter-group-header {
      grid-column: 1 / -1;
      font-family: 'Poppins', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 8px 0 4px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      margin-top: 8px;
    }

    .filter-group-header:first-child { margin-top: 0; }

    /* ── DARK MODE ── */
    body.dark {
      --bg:          #0d0d14;
      --text:        #e8e8f2;
      --text-muted:  #7878a0;
      --card-bg:     #17171f;
      --shadow:      0 2px 12px rgba(0,0,0,0.5);
      --shadow-hover: 0 8px 28px rgba(0,0,0,0.7);
    }

    body.dark #tabs-wrap {
      background: rgba(13,13,20,0.94);
      border-bottom-color: rgba(255,255,255,0.07);
      box-shadow: 0 2px 12px rgba(0,0,0,0.35);
    }

    body.dark .tab:hover { background: rgba(255,255,255,0.06); }

    body.dark #theme-toggle:hover { background: rgba(255,255,255,0.1); }

    body.dark .hero-cta {
      background: rgba(255,255,255,0.13);
      color: #fff;
      box-shadow: none;
    }

    body.dark .hero-cta:hover { background: rgba(255,255,255,0.22); }

    body.dark .filter-btn {
      border-color: rgba(255,255,255,0.14);
    }

    body.dark .filter-btn:hover {
      border-color: rgba(255,255,255,0.3);
      color: var(--text);
    }

    body.dark .filter-group-header {
      border-bottom-color: rgba(255,255,255,0.08);
    }

    body.dark .card-img {
      background: linear-gradient(135deg, #1c1c28 0%, #14141e 100%);
    }

    body.dark footer {
      border-top-color: rgba(255,255,255,0.07);
    }

    body.dark #tabs-wrap {
      background: rgba(13,13,20,0.94);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 20px 24px;
      color: var(--text-muted);
      font-size: 13px;
      border-top: 1px solid rgba(0,0,0,0.06);
    }

    footer span { opacity: 0.6; }
  </style>
</head>
<body>

<!-- ── HERO ── -->
<section id="hero">
  <div id="hero-bg"></div>
  <div id="hero-overlay"></div>

  <div class="hero-content">
    <h1 class="hero-title">
      Carter welcomes you<br>to Taipei! <span class="flag">🇹🇼</span>
    </h1>
    <div class="hero-stats">
      <div class="hero-stat" data-filter="famous"><span class="stat-label">Iconic</span></div>
      <div class="hero-stat" data-filter="must"><span class="stat-label">Must Try</span></div>
      <div class="hero-stat" data-filter="carter"><span class="stat-label">Carter's List</span></div>
      <div class="hero-stat" data-filter="group"><span class="stat-label">Your Spreadsheet</span></div>
    </div>
    <button class="hero-cta" onclick="document.getElementById('guide').scrollIntoView({behavior:'smooth'})">
      Explore the guide ↓
    </button>
  </div>

  <div class="scroll-arrow" onclick="document.getElementById('guide').scrollIntoView({behavior:'smooth'})">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
    <span>scroll</span>
  </div>
</section>

<!-- ── GUIDE ── -->
<section id="guide">
  <div id="tabs-wrap">
    <div id="tabs-inner">
      <div id="tabs">
        <button class="tab active" data-cat="eats">🍜 Eats</button>
        <button class="tab" data-cat="cafes">☕ Cafes</button>
        <button class="tab" data-cat="boba">🧋 Boba</button>
        <button class="tab" data-cat="bars">🍸 Bars</button>
        <button class="tab" data-cat="clubs">🎉 Clubs</button>
        <button class="tab" data-cat="markets">🌃 Night Markets</button>
        <button class="tab" data-cat="attractions">🗺️ Attractions</button>
        <button class="tab" data-cat="areas">🏙️ Areas</button>
      </div>
      <button id="theme-toggle" aria-label="Toggle dark mode">
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun"  width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </div>

  <div id="filters-bar">
    <button class="filter-btn" data-tag="carter">Carter's List</button>
    <button class="filter-btn" data-tag="group">Your Spreadsheet</button>
    <button class="filter-btn" data-tag="touristy">Tourist Spots</button>
    <button class="filter-btn" data-tag="famous">Popular Places</button>
  </div>

  <div id="cards-section">
    <div class="section-header">
      <h2 class="section-title" id="section-title"></h2>
      <p class="section-desc" id="section-desc"></p>
    </div>
    <div id="cards-grid"></div>
  </div>
</section>

<footer>
  <span>Made by Carter! Welcome to Taipei! 🇹🇼</span>
</footer>

<script>
  const CATEGORIES = {
    eats:        { label: '🍜 Eats',         color: '#FF6B6B', desc: 'The best food in Taipei — from iconic institutions to hidden local gems.' },
    cafes:       { label: '☕ Cafes',         color: '#FFB347', desc: 'Taipei has one of the world\'s best cafe cultures. These are the spots.' },
    boba:        { label: '🧋 Boba',          color: '#A855F7', desc: 'Taiwan invented bubble tea. Here\'s where to drink it properly.' },
    bars:        { label: '🍸 Bars',          color: '#9B59B6', desc: 'Craft cocktails, jazz bars, rooftops, and hidden speakeasies.' },
    clubs:       { label: '🎉 Clubs',         color: '#E74C3C', desc: 'Where Taipei dances. The best nightclubs for a proper night out.' },
    markets:     { label: '🌃 Night Markets', color: '#E91E8C', desc: 'Go hungry. These are Taipei\'s legendary street food markets.' },
    attractions: { label: '🗺️ Attractions',  color: '#3498DB', desc: 'Temples, skylines, parks, and hikes — the iconic sights of Taipei.' },
    areas:       { label: '🏙️ Areas',        color: '#1ABC9C', desc: 'Each neighborhood has its own vibe. Here\'s where to spend your time.' },
  };

  const TAGS = {
    must:     { label: 'Must Try',     color: '#E8453C' },
    famous:   { label: 'Iconic',       color: '#2980B9' },
    carter:   { label: "Carter's List", color: '#16A085' },

  function getImgUrl(place) {
    if (PLACE_URLS[place.name]) return PLACE_URLS[place.name];
    const key = PLACE_IMGS[place.name] || CAT_IMG[place.cat];
    const id  = IMGS[key];
    return id ? `https://images.unsplash.com/${id}?auto=format&fit=crop&w=600&q=75` : '';
  }

  let activeCategory = 'eats';
  let activeFilter   = null;

  function renderTags(tags) {
    if (!tags || tags.length === 0) return '';
    return '<div class="card-tags">' + tags.map(t => {
      const def = TAGS[t];
      return def ? `<span class="tag" style="color:${def.color};border-color:${def.color}">${def.label}</span>` : '';
    }).join('') + '</div>';
  }

  function buildCard(place, delay) {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${delay}ms`;
    const imgUrl = getImgUrl(place);
    card.innerHTML = `
      <div class="card-img">${imgUrl ? `<img src="${imgUrl}" alt="" loading="lazy" onerror="this.remove()">` : ''}</div>
      <div class="card-body">
        <div class="card-header">
          <span class="card-emoji">${place.emoji}</span>
          <div style="flex:1;min-width:0">
            <div class="card-name-row">
              <div class="name-mrt">
                <a class="card-name" href="${getMapsUrl(place)}" target="_blank" rel="noopener noreferrer">${place.name}</a>
                ${getMrtBadge(place.hood)}
              </div>
              ${place.rating != null ? `<span class="card-rating">⭐ ${place.rating.toFixed(1)}</span>` : ''}
            </div>
          </div>
        </div>
        ${renderTags(place.tags)}
        <p class="card-desc">${place.desc}</p>
      </div>
    `;
    return card;
  }

  function setFilterBtns(tag) {
    document.querySelectorAll('.filter-btn').forEach(b => {
      const on = b.dataset.tag === tag;
      b.classList.toggle('active', on);
      b.style.background   = on ? TAGS[b.dataset.tag].color : '';
      b.style.borderColor  = on ? TAGS[b.dataset.tag].color : '';
    });
  }

  function render(cat) {
    activeCategory = cat;
    activeFilter   = null;
    setFilterBtns(null);

    const catData = CATEGORIES[cat];
    document.getElementById('section-title').textContent = catData.label;
    document.getElementById('section-desc').textContent  = catData.desc;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));

    const places = PLACES.filter(p => p.cat === cat).sort((a, b) => (b.rating || 0) - (a.rating || 0));
    const grid = document.getElementById('cards-grid');
    grid.innerHTML = '';
    places.forEach((p, i) => grid.appendChild(buildCard(p, i * 60)));
  }

  function renderFilter(tag) {
    activeFilter = tag;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    setFilterBtns(tag);

    const tagDef = TAGS[tag];
    document.getElementById('section-title').textContent = tagDef.label;
    document.getElementById('section-desc').textContent  = `Every spot tagged "${tagDef.label}" across all categories.`;

    const matching = PLACES.filter(p => p.tags.includes(tag));
    const groups = {};
    matching.forEach(p => { if (!groups[p.cat]) groups[p.cat] = []; groups[p.cat].push(p); });
    Object.values(groups).forEach(g => g.sort((a, b) => (b.rating || 0) - (a.rating || 0)));

    const grid = document.getElementById('cards-grid');
    grid.innerHTML = '';
    let idx = 0;
    const catOrder = ['eats','cafes','boba','bars','clubs','markets','attractions','areas'];
    catOrder.filter(c => groups[c]).forEach(cat => {
      const hdr = document.createElement('div');
      hdr.className = 'filter-group-header';
      hdr.textContent = CATEGORIES[cat].label;
      grid.appendChild(hdr);
      groups[cat].forEach(p => grid.appendChild(buildCard(p, idx++ * 40)));
    });
  }

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      render(tab.dataset.cat);
      document.getElementById('cards-section').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  });

  document.querySelectorAll('.hero-stat[data-filter]').forEach(el => {
    el.addEventListener('click', () => {
      document.getElementById('guide').scrollIntoView({ behavior: 'smooth' });
      setTimeout(() => renderFilter(el.dataset.filter), 500);
    });
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tag = btn.dataset.tag;
      if (activeFilter === tag) {
        render(activeCategory);
      } else {
        renderFilter(tag);
        document.getElementById('cards-section').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    });
  });

  render('eats');

  // ── DARK MODE ──
  const themeToggle = document.getElementById('theme-toggle');

  function applyTheme(dark) {
    document.body.classList.toggle('dark', dark);
    localStorage.setItem('theme', dark ? 'dark' : 'light');
  }

  const saved = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(saved === 'dark' || (!saved && prefersDark));

  themeToggle.addEventListener('click', () => applyTheme(!document.body.classList.contains('dark')));
</script>
